<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Arrivals Catalogue</title>
  <meta name="description" content="Latest new arrival products with images, item codes and prices." />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#f5f3ef; --surface:#fff; --surface-soft:#fbfaf7; --text:#201a16; --muted:#746b63; --line:#e7e0d7; --brand:#2f2119; --accent:#c9924a; --accent-soft:#fff2df; --shadow:0 18px 45px rgba(47,33,25,.10); --radius:24px; --container:1440px;
    }
    *{box-sizing:border-box} body{margin:0;font-family:'Inter',system-ui,sans-serif;color:var(--text);background:radial-gradient(circle at top right,rgba(201,146,74,.18),transparent 32rem),linear-gradient(180deg,#fffaf3,var(--bg));min-height:100vh} body.modal-open{overflow:hidden}
    .topbar{position:sticky;top:0;z-index:20;background:rgba(245,243,239,.84);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)} .topbar-inner{width:min(var(--container),calc(100% - 28px));margin:auto;padding:12px 0;display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{display:flex;align-items:center;gap:12px}.mark{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--brand),#8a5c33);display:grid;place-items:center;color:#fff;font-weight:800}.brand h1{margin:0;font-size:1.15rem;letter-spacing:-.03em}.brand p{margin:3px 0 0;color:var(--muted);font-size:.84rem}.btn{border:1px solid var(--line);background:#fff;color:var(--text);border-radius:999px;min-height:42px;padding:0 16px;display:inline-flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;font-weight:800;cursor:pointer;box-shadow:0 8px 22px rgba(32,26,22,.06)}.btn-primary{background:var(--brand);border-color:var(--brand);color:#fff}.btn-small{min-height:36px;padding:0 12px;font-size:.9rem}
    .shell{width:min(var(--container),calc(100% - 28px));margin:auto;padding:26px 0 44px}.hero{background:rgba(255,255,255,.86);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:clamp(22px,4vw,42px);display:grid;grid-template-columns:minmax(0,1fr) auto;gap:18px;align-items:end}.eyebrow{display:inline-flex;border:1px solid #f1d8b0;background:var(--accent-soft);color:#7a4f18;border-radius:999px;padding:7px 12px;font-weight:800;font-size:.78rem;text-transform:uppercase;letter-spacing:.05em}.hero h2{margin:14px 0 8px;font-size:clamp(2rem,5vw,4.1rem);line-height:.95;letter-spacing:-.065em}.hero p{margin:0;color:var(--muted);font-size:1.05rem;line-height:1.65}.count-card{background:var(--surface-soft);border:1px solid var(--line);border-radius:18px;padding:18px;min-width:170px}.count-card span{display:block;color:var(--muted);font-weight:800;font-size:.8rem;text-transform:uppercase;letter-spacing:.05em}.count-card strong{display:block;font-size:2.2rem;letter-spacing:-.04em;margin-top:8px}
    .toolbar{position:sticky;top:67px;z-index:15;margin-top:18px;background:rgba(255,255,255,.88);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:14px;display:grid;grid-template-columns:minmax(230px,1fr) 180px 150px auto;gap:10px}.field label{display:block;margin:0 0 6px 2px;color:var(--muted);font-size:.75rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em}.input,.select{width:100%;min-height:44px;border:1px solid var(--line);border-radius:16px;background:var(--surface-soft);padding:0 14px;outline:none}.input:focus,.select:focus{border-color:rgba(90,61,43,.45);box-shadow:0 0 0 4px rgba(201,146,74,.14);background:#fff}.summary{margin:18px 0 14px;color:var(--muted);font-weight:800}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px}.card{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:0 12px 30px rgba(32,26,22,.08);transition:.18s ease;position:relative}.card:hover{transform:translateY(-4px);box-shadow:0 20px 46px rgba(32,26,22,.13)}.image-wrap{aspect-ratio:1/.98;background:linear-gradient(135deg,#f8f4ef,#eee5db);position:relative;overflow:hidden}.product-img{width:100%;height:100%;object-fit:cover;display:block;cursor:zoom-in;transition:transform .3s ease}.card:hover .product-img{transform:scale(1.04)}.save{position:absolute;top:10px;left:10px;border:0;border-radius:12px;background:rgba(255,255,255,.9);width:36px;min-height:36px;box-shadow:0 8px 20px rgba(32,26,22,.16);cursor:pointer}.price{position:absolute;right:10px;bottom:10px;display:inline-flex;align-items:center;gap:5px;padding:8px 10px;border-radius:999px;background:rgba(32,26,22,.92);color:#fff;font-weight:800}.price img{height:1em;filter:brightness(0) invert(1)}.body{padding:16px;text-align:center}.title{font-size:1.08rem;line-height:1.35;letter-spacing:-.02em;margin:0 0 9px;user-select:text}.arabic{font-family:'Amiri',serif;direction:rtl;font-size:1.18rem;margin:0 0 9px;color:var(--muted);user-select:text}.code{display:inline-flex;border-radius:999px;background:var(--accent-soft);color:#7a4f18;padding:7px 11px;font-weight:800}.pagination{margin-top:22px;display:flex;justify-content:center;align-items:center;gap:10px;flex-wrap:wrap}.empty{grid-column:1/-1;text-align:center;background:#fff;border:1px dashed var(--line);border-radius:var(--radius);padding:48px 18px;color:var(--muted)}.modal{display:none;position:fixed;inset:0;z-index:100;background:rgba(13,10,8,.88);backdrop-filter:blur(7px)}.modal.active{display:grid;place-items:center}.modal img{max-width:96vw;max-height:86vh;object-fit:contain;border-radius:18px;box-shadow:0 30px 90px rgba(0,0,0,.35)}.close{position:fixed;top:18px;right:18px;border:0;border-radius:50%;background:#fff;width:44px;min-height:44px;font-size:1.4rem;cursor:pointer}
    @media(max-width:850px){.hero{grid-template-columns:1fr}.toolbar{position:static;grid-template-columns:1fr 1fr}.toolbar .wide{grid-column:1/-1}}@media(max-width:560px){.topbar-inner,.shell{width:calc(100% - 20px)}.brand p{display:none}.hero{padding:20px}.toolbar{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.body{padding:11px}.title{font-size:.9rem}.arabic{font-size:1rem}.code{font-size:.78rem}.count-card{min-width:0}.topbar .btn{font-size:.82rem;padding:0 10px}}
  </style>
</head>
<body>
  <header class="topbar"><div class="topbar-inner"><div class="brand"><div class="mark">NA</div><div><h1>New Arrivals</h1><p>Latest products from New_Arrivals.csv</p></div></div><a class="btn btn-primary btn-small" href="index.html">Full Catalogue</a></div></header>
  <main class="shell">
    <section class="hero"><div><span class="eyebrow">Fresh Products</span><h2>New arrivals display.</h2><p>A premium product view for the latest items. Add more rows to New_Arrivals.csv and upload images to New_Arrivals_Images.</p></div><div class="count-card"><span>Total Items</span><strong id="totalCount">—</strong></div></section>
    <section class="toolbar"><div class="field wide"><label for="search">Search</label><input class="input" id="search" type="search" placeholder="Search name, Arabic name, item code..."></div><div class="field"><label for="sort">Sort</label><select class="select" id="sort"><option value="default">Default Order</option><option value="name">Name A-Z</option><option value="price-desc">Price High-Low</option><option value="price-asc">Price Low-High</option><option value="code">Item Code</option></select></div><div class="field"><label for="pageSize">Per Page</label><select class="select" id="pageSize"><option>12</option><option selected>24</option><option>48</option></select></div><button class="btn" id="reset">Reset</button></section>
    <div class="summary" id="summary">Loading new arrivals...</div><section class="grid" id="catalogue"></section><nav class="pagination" id="pagination"></nav>
  </main>
  <div class="modal" id="imageModal" onclick="closeModal()"><button class="close" onclick="closeModal()">×</button><img id="modalImage" alt="Product preview" onclick="event.stopPropagation()"></div>
<script>
const CSV_FILE='New_Arrivals.csv'; const IMG_DIR='New_Arrivals_Images/'; const AED='dirham-symbol.svg'; let allItems=[]; let filtered=[]; let currentPage=1;
const el={search:document.getElementById('search'),sort:document.getElementById('sort'),pageSize:document.getElementById('pageSize'),grid:document.getElementById('catalogue'),pagination:document.getElementById('pagination'),summary:document.getElementById('summary')};
function safe(v){return String(v??'').trim()} function num(v){const n=parseFloat(v);return Number.isFinite(n)?n:0} function esc(v){return safe(v).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[c]))}
function load(){Papa.parse(CSV_FILE,{download:true,header:true,skipEmptyLines:true,complete:({data,errors})=>{if(errors?.length)console.warn(errors);allItems=(data||[]).filter(i=>safe(i['Item Code'])&&safe(i['Item Description-English'])&&safe(i['Image Filename'])).map((i,idx)=>({...i,_idx:idx,_code:safe(i['Item Code']),_name:safe(i['Item Description-English']),_arabic:safe(i['Item Description-Arabic']),_price:num(i['Price']),_search:Object.values(i).map(v=>safe(v).toLowerCase()).join(' ')}));document.getElementById('totalCount').textContent=allItems.length.toLocaleString();apply();},error:()=>showError('Failed to load New_Arrivals.csv. Check filename and GitHub Pages path.')}})}
function apply(){const q=el.search.value.trim().toLowerCase().split(/\s+/).filter(Boolean);filtered=allItems.filter(i=>q.length?q.every(k=>i._search.includes(k)):true);sort();render()}
function sort(){const m=el.sort.value;filtered.sort((a,b)=>{if(m==='price-desc')return b._price-a._price;if(m==='price-asc')return a._price-b._price;if(m==='code')return a._code.localeCompare(b._code,undefined,{numeric:true});if(m==='name')return a._name.localeCompare(b._name);return a._idx-b._idx})}
function render(){const size=parseInt(el.pageSize.value,10)||24;const pages=Math.max(1,Math.ceil(filtered.length/size));currentPage=Math.min(currentPage,pages);const start=(currentPage-1)*size;const rows=filtered.slice(start,start+size);el.summary.textContent=`${filtered.length.toLocaleString()} new arrival${filtered.length===1?'':'s'} • Page ${currentPage} of ${pages}`;if(!rows.length){el.grid.innerHTML='<div class="empty"><h2>No matching new arrivals</h2><p>Try another keyword or reset filters.</p></div>';el.pagination.innerHTML='';return}el.grid.innerHTML=rows.map(card).join('');renderPagination(pages)}
function card(i){const img=IMG_DIR+safe(i['Image Filename']);return `<article class="card"><div class="image-wrap"><button class="save" onclick="saveCard(this.closest('.card'),'${esc(i._code)}')">📷</button><img class="product-img" loading="lazy" src="${esc(img)}" alt="${esc(i._name)}" onerror="this.src='https://via.placeholder.com/600x600?text=Image+Not+Found'" onclick="openModal('${esc(img)}')"><span class="price"><img src="${AED}" alt="AED"> ${Number.isFinite(i._price)?i._price.toFixed(2):'N/A'}</span></div><div class="body"><h2 class="title">${esc(i._name)}</h2>${i._arabic?`<p class="arabic">${esc(i._arabic)}</p>`:''}<span class="code">Item Code: ${esc(i._code)}</span></div></article>`}
function renderPagination(pages){if(pages<=1){el.pagination.innerHTML='';return}let b=`<button class="btn btn-small" ${currentPage===1?'disabled':''} onclick="go(${currentPage-1})">Previous</button>`;for(let p=1;p<=pages;p++){if(p===1||p===pages||Math.abs(p-currentPage)<=1)b+=`<button class="btn btn-small ${p===currentPage?'btn-primary':''}" onclick="go(${p})">${p}</button>`;else if(Math.abs(p-currentPage)===2)b+='<span>…</span>'}b+=`<button class="btn btn-small" ${currentPage===pages?'disabled':''} onclick="go(${currentPage+1})">Next</button>`;el.pagination.innerHTML=b}
function go(p){currentPage=p;render();scrollTo({top:0,behavior:'smooth'})} function showError(m){el.summary.textContent='Error';el.grid.innerHTML=`<div class="empty"><h2>Unable to load</h2><p>${esc(m)}</p></div>`}
function openModal(src){document.getElementById('modalImage').src=src;document.getElementById('imageModal').classList.add('active');document.body.classList.add('modal-open')} function closeModal(){document.getElementById('imageModal').classList.remove('active');document.body.classList.remove('modal-open')}
function saveCard(card,code){html2canvas(card,{backgroundColor:'#fff',useCORS:true,scale:2}).then(c=>{const a=document.createElement('a');a.download=`${code||'new-arrival'}-card.png`;a.href=c.toDataURL('image/png');a.click()}).catch(()=>alert('Failed to save this card.'))}
['input','change'].forEach(e=>{el.search.addEventListener(e,()=>{currentPage=1;apply()});el.sort.addEventListener(e,()=>{currentPage=1;apply()});el.pageSize.addEventListener(e,()=>{currentPage=1;render()})});document.getElementById('reset').addEventListener('click',()=>{el.search.value='';el.sort.value='default';currentPage=1;apply()});document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});load();
</script>
</body>
</html>
